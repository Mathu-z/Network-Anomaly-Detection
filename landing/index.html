<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Network Intrusion Detection System</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Matrix Background -->
    <canvas id="matrix"></canvas>

    <!-- Dark Overlay -->
    <div class="overlay"></div>

    <!-- Main Container -->
    <div class="container">

        <div class="logo">
            🛡️
        </div>

        <h1>
            AI NETWORK<br>
            INTRUSION DETECTION<br>
            SYSTEM
        </h1>

        <p class="subtitle">
            Machine Learning Powered Security Dashboard
        </p>

        <p class="small">
            Random Forest • NSL-KDD Dataset • Streamlit
        </p>

        <div class="cards">

            <div class="card">
                <h2>79.61%</h2>
                <span>Accuracy</span>
            </div>

            <div class="card">
                <h2>Random Forest</h2>
                <span>AI Model</span>
            </div>

            <div class="card">
                <h2>NSL-KDD</h2>
                <span>Dataset</span>
            </div>

            <div class="card">
                <h2>Online</h2>
                <span>Status</span>
            </div>

        </div>

        <button id="launchBtn">

            🚀 ENTER SECURITY CONSOLE

        </button>

        <div id="loadingScreen">

            <h2>Initializing Security Console...</h2>

            <div class="progress">

                <div class="progress-bar" id="progressBar"></div>

            </div>

            <p id="loadingText">
                Starting...
            </p>

        </div>

    </div>

    <script src="matrix.js"></script>

    <script src="loading.js"></script>

</body>

</html>
